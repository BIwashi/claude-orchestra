<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <style>
      @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
      .bg { fill: #1a1b26; }
      .frame { fill: none; stroke: #414868; stroke-width: 1; rx: 8; }
      .title-bar { fill: #24283b; }
      .dot-r { fill: #f7768e; } .dot-y { fill: #e0af68; } .dot-g { fill: #9ece6a; }
      text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; fill: #a9b1d6; }
      .prompt { fill: #7dcfff; } .cmd { fill: #c0caf5; font-weight: bold; }
      .brand { fill: #bb9af7; font-weight: bold; } .green { fill: #9ece6a; }
      .yellow { fill: #e0af68; } .cyan { fill: #7dcfff; } .blue { fill: #7aa2f7; }
      .dim { fill: #565f89; } .magenta { fill: #bb9af7; } .red { fill: #f7768e; }
      .bold { font-weight: bold; }
      .l1 { animation: appear 0.3s ease forwards; animation-delay: 0.3s; opacity: 0; }
      .l2 { animation: appear 0.3s ease forwards; animation-delay: 0.8s; opacity: 0; }
      .l3 { animation: appear 0.3s ease forwards; animation-delay: 1.1s; opacity: 0; }
      .l4 { animation: appear 0.3s ease forwards; animation-delay: 1.4s; opacity: 0; }
      .l5 { animation: appear 0.3s ease forwards; animation-delay: 1.7s; opacity: 0; }
      .l6 { animation: appear 0.3s ease forwards; animation-delay: 2.5s; opacity: 0; }
      .l7 { animation: appear 0.3s ease forwards; animation-delay: 3.1s; opacity: 0; }
      .l8 { animation: appear 0.3s ease forwards; animation-delay: 3.7s; opacity: 0; }
      .l9 { animation: appear 0.3s ease forwards; animation-delay: 4.3s; opacity: 0; }
      .l10 { animation: appear 0.3s ease forwards; animation-delay: 4.7s; opacity: 0; }
      .l11 { animation: appear 0.3s ease forwards; animation-delay: 5.5s; opacity: 0; }
      .l12 { animation: appear 0.3s ease forwards; animation-delay: 6.3s; opacity: 0; }
      .l13 { animation: appear 0.3s ease forwards; animation-delay: 7.1s; opacity: 0; }
      .l14 { animation: appear 0.3s ease forwards; animation-delay: 7.5s; opacity: 0; }
      .l15 { animation: appear 0.3s ease forwards; animation-delay: 8.5s; opacity: 0; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect class="bg" width="720" height="420" rx="8"/>
  <rect class="frame" x="0.5" y="0.5" width="719" height="419" rx="8"/>

  <!-- Title bar -->
  <rect class="title-bar" width="720" height="32" rx="8 8 0 0"/>
  <circle class="dot-r" cx="16" cy="16" r="5"/>
  <circle class="dot-y" cx="34" cy="16" r="5"/>
  <circle class="dot-g" cx="52" cy="16" r="5"/>
  <text x="340" y="10" text-anchor="middle" class="dim" font-size="12">claude-orchestra</text>

  <!-- Content -->
  <g transform="translate(16, 44)">
    <!-- Prompt -->
    <g class="l1">
      <text y="0"><tspan class="prompt">$</tspan><tspan class="cmd"> claude-orchestra start</tspan></text>
    </g>

    <!-- Startup -->
    <g class="l2">
      <text y="28">🎵 <tspan class="brand">Claude Orchestra</tspan> - Conductor starting...</text>
    </g>
    <g class="l3">
      <text y="48">   Mode: <tspan class="green">mixer</tspan> (track: orpheus-underworld)</text>
    </g>
    <g class="l4">
      <text y="68">   Volume: <tspan class="yellow">50%</tspan></text>
    </g>

    <!-- Watching -->
    <g class="l5">
      <text y="96"><tspan class="dim">[10:30:01]</tspan> Watching for events...</text>
    </g>

    <!-- Sessions joining -->
    <g class="l6">
      <text y="124"><tspan class="dim">[10:30:05]</tspan> 🎹 <tspan class="blue bold">Piano</tspan> joins! (session a1b2c3d4…)</text>
    </g>
    <g class="l7">
      <text y="148"><tspan class="dim">[10:30:08]</tspan> 🎻 <tspan class="magenta bold">Cello</tspan> joins! (session e5f6g7h8…)</text>
    </g>
    <g class="l8">
      <text y="172"><tspan class="dim">[10:30:12]</tspan> 🪈 <tspan class="green bold">Flute</tspan> joins! (session i9j0k1l2…)</text>
    </g>
    <g class="l9">
      <text y="196"><tspan class="dim">[10:30:15]</tspan> 🎺 <tspan class="yellow bold">Trumpet</tspan> joins! (session m3n4o5p6…)</text>
    </g>

    <!-- Section transitions -->
    <g class="l10">
      <text y="224"><tspan class="dim">[10:30:15]</tspan> ♪ Section: <tspan class="cyan">Introduction</tspan> → <tspan class="cyan">Build</tspan></text>
    </g>
    <g class="l11">
      <text y="248"><tspan class="dim">[10:30:22]</tspan> ♪ Section: <tspan class="cyan">Build</tspan> → <tspan class="cyan">Theme</tspan></text>
    </g>
    <g class="l12">
      <text y="272"><tspan class="dim">[10:30:30]</tspan> ♪ Section: <tspan class="cyan">Theme</tspan> → <tspan class="cyan bold">Galop! 💃</tspan></text>
    </g>

    <!-- Leave -->
    <g class="l13">
      <text y="300"><tspan class="dim">[10:30:45]</tspan> 🎻 <tspan class="dim">Cello leaves.</tspan> (session e5f6g7h8…)</text>
    </g>

    <!-- Status line -->
    <g class="l14">
      <text y="328"><tspan class="dim">[10:30:50]</tspan> ♪ Section: <tspan class="cyan bold">Galop!</tspan> → <tspan class="cyan">Crescendo</tspan></text>
    </g>

    <g class="l15">
      <text y="360">🎵 <tspan class="dim">orpheus-underworld — Crescendo | 3 sessions | vol 50%</tspan></text>
    </g>
  </g>
</svg>
